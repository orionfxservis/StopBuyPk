<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blogs - StopBuyPk</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(to bottom,
    #ecfdf5,
    #f0fdf4,
    #ffffff);
}

/* HEADER */
.main-header{
    background:
    linear-gradient(90deg,#065f46,#059669);
}

/* GLASS */
.glass{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(12px);
}

/* HERO */
.hero-overlay{
    background:
    linear-gradient(to right,
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.2));
}

/* SECTION TITLE */
.section-title{
    background:linear-gradient(90deg,#065f46,#10b981);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* BLOG CARD */
.blog-card{
    transition:0.4s ease;
    position:relative;
}

.blog-card:hover{
    transform:
    translateY(-10px)
    scale(1.02);

    box-shadow:
    0 20px 40px rgba(5,150,105,0.15);
}

/* IMAGE ZOOM */
.blog-card img{
    transition:0.5s ease;
}

.blog-card:hover img{
    transform:scale(1.08);
}

/* CATEGORY BADGE */
.blog-badge{
    position:absolute;
    top:15px;
    left:15px;

    background:
    linear-gradient(90deg,#10b981,#059669);

    color:white;

    padding:6px 14px;

    border-radius:999px;

    font-size:12px;
    font-weight:600;

    z-index:10;

    box-shadow:
    0 6px 14px rgba(0,0,0,0.18);
}

/* BUTTON */
.read-btn{
    transition:0.3s ease;
}

.read-btn:hover{
    transform:translateX(6px);
}

/* HERO SLIDER */
.hero-slider{
    position:absolute;
    inset:0;
    display:flex;
    width:300%;
    animation:heroSlide 18s linear infinite;
}

.hero-slide{
    width:100vw;
    height:420px;

    object-fit:contain;
    object-position:center;

    background:#000;

    flex-shrink:0;
}

@keyframes heroSlide{

    0%,30%{
        transform:translateX(0%);
    }

    33%,63%{
        transform:translateX(-100vw);
    }

    66%,96%{
        transform:translateX(-200vw);
    }

    100%{
        transform:translateX(0%);
    }

}

/* MOBILE */
@media(max-width:768px){

    .hero-slide{
        height:260px;
    }

}

</style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- HEADER -->
    <!-- Top Navigation Bar -->
    <nav class="bg-[#0A3D2A] text-white sticky top-0 z-[99999]">
        <div
            class="max-w-screen-2xl mx-auto px-4 py-2 sm:py-0 sm:h-[60px] flex flex-wrap sm:flex-nowrap items-center justify-between gap-y-3 gap-x-2 sm:gap-4">

            <!-- LEFT: Logo -->
            <a href="../index.html" class="flex items-center gap-2 flex-shrink-0 order-1 sm:order-none cursor-pointer">
                <div class="bg-white p-1 rounded-xl shadow-sm w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center">
                    <img src="../images/logo/stopbuy-logo.png" alt="StopBuy"
                        class="h-6 w-6 sm:h-7 sm:w-7 object-contain">
                </div>

                <div class="flex flex-col leading-tight">
                    <div class="flex items-center gap-2">
                        <span class="font-bold text-lg sm:text-xl tracking-tight">
                            <span class="text-[#8CC63F]">Stop</span><span class="text-[#5B9BD5]">Buy</span>
                        </span>
                        <div
                            class="hidden md:block border border-[#24533e] bg-emerald-900/20 text-[#58b284] px-2 py-[2px] rounded text-[10px] font-semibold tracking-wide">
                            Price Smart, Save More
                        </div>
                    </div>
                    <span class="hidden md:block text-[11px] text-gray-300 mt-0.5">
                        Smart Price Comparison for Pakistan
                    </span>
                </div>
            </a>


            <!-- CENTER: Location -->
            <div class="order-3 sm:order-none w-full sm:w-auto flex justify-center sm:flex-1">
                <div class="hidden lg:flex items-center gap-1 text-slate-700 text-sm bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200 cursor-pointer hover:bg-slate-200 transition whitespace-nowrap"
                    onclick="showLocationModal()" id="locationBox">
                    <span>📍</span>
                    <span class="font-medium" id="current-location">Detecting...</span>
                    <span class="text-[0.6rem] ml-1">▼</span>
                </div>
            </div>

            <!-- RIGHT: Actions -->
            <div class="flex items-center gap-1 sm:gap-2 flex-shrink-0 order-2 sm:order-none">
                <!-- Language Toggle -->
                <div onclick="toggleLanguage()" id="lang-toggle-btn"
                    class="flex items-center justify-center w-[60px] sm:w-[70px] h-[34px] sm:h-[38px] bg-white/10 hover:bg-white/20 rounded-full text-[13px] sm:text-sm font-medium cursor-pointer transition-colors"
                    title="Switch to Urdu">
                    <span class="text-center" id="lang-toggle-text">اردو</span>
                </div>

                <!-- Login Profile Icon -->
                <div class="relative group z-[100000]">
                    <div
                        class="login-icon-container flex items-center justify-center w-[34px] h-[34px] sm:w-[42px] sm:h-[42px] rounded-full cursor-pointer bg-transparent hover:bg-white/10 transition-colors">
                        <i class="fas fa-user-shield text-emerald-400 text-sm sm:text-lg"></i>
                    </div>
                </div>
            </div>

        </div>
        <!-- Category Bar -->
        <div class="bg-[#052C22] px-4 py-2 relative z-50 min-h-[40px]">
            <div class="max-w-screen-2xl mx-auto w-full flex items-center relative">
                <!-- Navigation Links -->
                <div class="flex items-center gap-5 z-10">
                    <!-- Home Link -->
                    <a href="../index.html"
                        class="text-emerald-400 hover:text-emerald-300 font-semibold text-sm transition-colors flex items-center">
                        <i class="fas fa-arrow-left mr-1.5"></i> Home
                    </a>
                </div>

                <!-- Centered Heading -->
                <h1
                    class="text-[15px] tracking-wide font-bold text-white absolute left-1/2 -translate-x-1/2 whitespace-nowrap">Blogs</h1>
            </div>
        </div>
    </nav>

<!-- HERO -->
<div class="max-w-screen-2xl mx-auto px-4 py-6">
    <div class="relative w-full rounded-3xl overflow-hidden shadow-lg border border-emerald-200 mb-2 bg-[#F4F9F2]">
        <img src="../images/grafix/blogs-writing.png" alt="Blogs Banner"
            class="w-full h-[150px] sm:h-[200px] md:h-[300px] object-cover md:object-fill">
    </div>
</div>

<!-- BLOGS -->
<section class="max-w-screen-2xl mx-auto px-4 py-16">

    <!-- TOP -->
    <div class="flex justify-between items-center mb-10">
        <div>
            <h2 class="text-3xl md:text-4xl font-extrabold text-[#0A3D2A]">
                All Blogs & Articles
            </h2>
            <p class="text-gray-500 mt-2 font-medium">
                Insights, price trends & buying guides
            </p>
        </div>
    </div>

    <!-- GRID -->
    <div id="blogs-container" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
        <!-- Dynamic blogs will be injected here -->
        <div style="text-align:center; grid-column: 1/-1; padding:40px; color:#666; font-size:1.1rem;">
            Loading blogs...
        </div>
    </div>

</section>

<!-- BLOG MODAL -->
<div id="blog-modal" class="fixed inset-0 z-[999999] hidden items-center justify-center bg-black/60 backdrop-blur-sm p-4">
    <div class="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl">
        
        <!-- Modal Header -->
        <div class="flex items-center justify-between p-4 md:p-6 border-b border-gray-100 bg-gray-50/50">
            <div id="modal-category" class="bg-emerald-100 text-emerald-800 px-4 py-1.5 rounded-full text-xs font-bold tracking-wide">
                Category
            </div>
            <button onclick="closeBlogModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-100 hover:bg-red-100 hover:text-red-600 transition-colors">
                <i class="fas fa-times text-lg"></i>
            </button>
        </div>

        <!-- Modal Body (Scrollable) -->
        <div class="overflow-y-auto flex-1 p-4 md:p-8">
            <img id="modal-image" src="" class="w-full h-64 md:h-80 object-cover rounded-2xl mb-8 shadow-sm">
            
            <h1 id="modal-title" class="text-2xl md:text-4xl font-extrabold text-gray-900 leading-tight mb-4"></h1>
            
            <div class="flex items-center gap-4 text-sm text-gray-500 mb-8 pb-8 border-b border-gray-100">
                <div class="flex items-center gap-2"><i class="far fa-user text-emerald-600"></i> <span id="modal-author">Admin</span></div>
                <div class="flex items-center gap-2"><i class="far fa-calendar text-emerald-600"></i> <span id="modal-date">Date</span></div>
            </div>

            <!-- Content Area -->
            <div id="modal-content" class="prose prose-emerald max-w-none text-gray-700 leading-loose text-base md:text-lg">
                <!-- Rich text content will be injected here -->
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
    <div class="w-full bg-[#0A3D2A] text-emerald-50 text-center py-4 text-sm mt-auto border-t border-[#052C22]">
        &copy; 2026 StopBuyPk - Smart Price Comparison
    </div>

<script src="../js/location.js"></script>
<script src="../js/data-service.js"></script>
<script>
// --- Language Logic ---
let currentLang = localStorage.getItem('qeematLang') || 'en';

function updateLanguageUI(lang) {
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ur' ? 'rtl' : 'ltr';
    
    document.querySelectorAll('.lang-en').forEach(el => {
        el.style.display = (lang === 'en') ? '' : 'none';
    });
    document.querySelectorAll('.lang-ur').forEach(el => {
        el.style.display = (lang === 'ur') ? '' : 'none';
    });

    const toggleText = document.getElementById('lang-toggle-text');
    if (toggleText) toggleText.textContent = lang === 'ur' ? 'English' : 'اردو';
}

function toggleLanguage() {
    const newLang = document.documentElement.lang === 'ur' ? 'en' : 'ur';
    localStorage.setItem('qeematLang', newLang);
    updateLanguageUI(newLang);
}

// Store blogs globally for the modal
window.allBlogs = [];

function openBlogModal(index) {
    const blog = window.allBlogs[index];
    if (!blog) return;

    const isUrdu = document.documentElement.lang === 'ur';
    const title = isUrdu && blog.titleUr ? blog.titleUr : (blog.titleEn || 'Untitled');
    const content = isUrdu && blog.contentUr ? blog.contentUr : (blog.contentEn || 'No content available.');
    const category = isUrdu && blog.categoryUr ? blog.categoryUr : (blog.categoryEn || 'Update');
    
    document.getElementById('modal-category').innerText = category;
    document.getElementById('modal-title').innerText = title;
    document.getElementById('modal-author').innerText = blog.author || 'Admin';
    document.getElementById('modal-date').innerText = blog.date ? new Date(blog.date).toLocaleDateString() : '';
    document.getElementById('modal-image').src = blog.image || '../images/placeholder.jpg';
    document.getElementById('modal-content').innerHTML = content;

    const modal = document.getElementById('blog-modal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    document.body.style.overflow = 'hidden'; // Prevent background scrolling
}

function closeBlogModal() {
    const modal = document.getElementById('blog-modal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    document.body.style.overflow = '';
}

document.addEventListener("DOMContentLoaded", async () => {
    updateLanguageUI(currentLang);

    const blogsContainer = document.getElementById('blogs-container');
    if (!blogsContainer) return;

    try {
        const blogs = await DataService.getBlogs();
        if (!blogs || blogs.length === 0) {
            blogsContainer.innerHTML = '<div style="text-align:center; grid-column: 1/-1; padding:40px; color:#666; font-size:1.1rem;">No blogs available at the moment.</div>';
            return;
        }

        const publishedBlogs = blogs.filter(b => b.status === 'Publish');
        window.allBlogs = publishedBlogs; // Save for modal

        if (publishedBlogs.length === 0) {
            blogsContainer.innerHTML = '<div style="text-align:center; grid-column: 1/-1; padding:40px; color:#666; font-size:1.1rem;">No published blogs available.</div>';
            return;
        }

        // Render blogs with BOTH English and Urdu elements for instant toggling
        blogsContainer.innerHTML = publishedBlogs.map((blog, index) => {
            const titleEn = blog.titleEn || 'Untitled';
            const titleUr = blog.titleUr || titleEn;
            const descEn = blog.descEn || '';
            const descUr = blog.descUr || descEn;
            const catEn = blog.categoryEn || 'Update';
            const catUr = blog.categoryUr || catEn;
            const image = blog.image || '../images/placeholder.jpg';

            return `
                <div class="blog-card bg-white rounded-3xl overflow-hidden modern-shadow border border-emerald-100 cursor-pointer" onclick="openBlogModal(${index})">
                    <!-- EN Badges -->
                    <div class="blog-badge lang-en">${catEn}</div>
                    <!-- UR Badges -->
                    <div class="blog-badge lang-ur" style="display:none;">${catUr}</div>

                    <div class="overflow-hidden">
                        <img src="${image}" class="w-full h-52 object-cover rounded-t-3xl" onerror="this.src='../images/placeholder.jpg'">
                    </div>
                    <div class="p-6">
                        <!-- EN Content -->
                        <div class="lang-en">
                            <div class="font-bold text-2xl text-gray-800" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                ${titleEn}
                            </div>
                            <div class="text-sm text-gray-600 mt-3 leading-relaxed" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                                ${descEn}
                            </div>
                            <button class="read-btn mt-5 text-sm text-emerald-700 font-semibold">
                                Read Full Article →
                            </button>
                        </div>

                        <!-- UR Content -->
                        <div class="lang-ur" style="display:none;">
                            <div class="font-bold text-2xl text-gray-800" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                ${titleUr}
                            </div>
                            <div class="text-sm text-gray-600 mt-3 leading-relaxed" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                                ${descUr}
                            </div>
                            <button class="read-btn mt-5 text-sm text-emerald-700 font-semibold">
                                مکمل مضمون پڑھیں ←
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Apply current lang to new dynamic elements
        updateLanguageUI(document.documentElement.lang);

    } catch (err) {
        console.error('Error loading blogs:', err);
        blogsContainer.innerHTML = '<div style="text-align:center; grid-column: 1/-1; padding:40px; color:#ef4444;">Failed to load blogs. Please refresh the page.</div>';
    }
});
</script>
</body>
</html>
